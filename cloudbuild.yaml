steps:
  # Fail fast if the PostHog key is missing so the build doesn't produce an unusable bundle.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - "if [ -z \"$_VITE_POSTHOG_KEY\" ] || [ \"$_VITE_POSTHOG_KEY\" = '\"\"' ] || [ \"$_VITE_POSTHOG_KEY\" = '_REQUIRED_' ]; then echo 'Missing substitution _VITE_POSTHOG_KEY'; exit 1; fi"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "Dockerfile"
      - "--build-arg"
      - "VITE_POSTHOG_KEY=${_VITE_POSTHOG_KEY}"
      - "--build-arg"
      - "VITE_POSTHOG_HOST=${_VITE_POSTHOG_HOST}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
      - "."

  # Push both tags to Artifact Registry so Cloud Run can pull the image.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--quiet"
images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
substitutions:
  _REGION: global
  _REPO: a-web-copilot # Artifact Registry repo name (no slashes)
  _SERVICE: a-web-copilot
  _VITE_POSTHOG_KEY: _REQUIRED_ # set in trigger or via Secret Manager substitution
  _VITE_POSTHOG_HOST: "https://us.i.posthog.com"
options:
  logging: CLOUD_LOGGING_ONLY
